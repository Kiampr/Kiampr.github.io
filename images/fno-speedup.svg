<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 250" width="580" height="250" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="250" fill="#ffffff" rx="10" stroke="#e9ecef" stroke-width="1.5"/>

  <!-- Title -->
  <text x="290" y="34" font-size="14" font-weight="700" fill="#212529" text-anchor="middle">Neural Operator Surrogate vs. Classical PDE Solver</text>
  <text x="290" y="52" font-size="11" fill="#868e96" text-anchor="middle">Multiphase compositional transport — time per forward simulation</text>

  <!-- Classical bar background track -->
  <rect x="160" y="80" width="370" height="38" fill="#f1f3f5" rx="5"/>
  <!-- Classical bar fill -->
  <rect x="160" y="80" width="370" height="38" fill="#adb5bd" rx="5"/>
  <!-- Classical label -->
  <text x="152" y="97" font-size="11" fill="#495057" text-anchor="end">Classical</text>
  <text x="152" y="111" font-size="11" fill="#495057" text-anchor="end">PDE Solver</text>
  <!-- Classical value -->
  <text x="540" y="104" font-size="12" fill="#495057" font-weight="600">~60 min</text>

  <!-- FNO bar background track -->
  <rect x="160" y="143" width="370" height="38" fill="#f1f3f5" rx="5"/>
  <!-- FNO bar fill (37px = 1/10 of 370) -->
  <rect x="160" y="143" width="37" height="38" fill="#3d5a80" rx="5"/>
  <!-- FNO label -->
  <text x="152" y="160" font-size="11" fill="#3d5a80" text-anchor="end" font-weight="700">FNO</text>
  <text x="152" y="174" font-size="11" fill="#3d5a80" text-anchor="end" font-weight="700">Surrogate</text>
  <!-- FNO value -->
  <text x="207" y="167" font-size="12" fill="#3d5a80" font-weight="700">~6 min</text>

  <!-- 10x speedup badge -->
  <rect x="270" y="125" width="105" height="28" fill="#3d5a80" rx="14"/>
  <text x="322" y="144" font-size="13" fill="white" text-anchor="middle" font-weight="700">≈ 10× faster</text>

  <!-- Bracket connecting bars to badge -->
  <line x1="197" y1="120" x2="197" y2="141" stroke="#3d5a80" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="197" y1="130" x2="262" y2="130" stroke="#3d5a80" stroke-width="1.5"/>
  <polygon points="262,127 270,130 262,133" fill="#3d5a80"/>

  <!-- x-axis line -->
  <line x1="160" y1="198" x2="530" y2="198" stroke="#dee2e6" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="160" y1="195" x2="160" y2="201" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="212" font-size="10" fill="#adb5bd" text-anchor="middle">0</text>
  <line x1="252" y1="195" x2="252" y2="201" stroke="#adb5bd" stroke-width="1"/>
  <text x="252" y="212" font-size="10" fill="#adb5bd" text-anchor="middle">15 min</text>
  <line x1="345" y1="195" x2="345" y2="201" stroke="#adb5bd" stroke-width="1"/>
  <text x="345" y="212" font-size="10" fill="#adb5bd" text-anchor="middle">30 min</text>
  <line x1="437" y1="195" x2="437" y2="201" stroke="#adb5bd" stroke-width="1"/>
  <text x="437" y="212" font-size="10" fill="#adb5bd" text-anchor="middle">45 min</text>
  <line x1="530" y1="195" x2="530" y2="201" stroke="#adb5bd" stroke-width="1"/>
  <text x="530" y="212" font-size="10" fill="#adb5bd" text-anchor="middle">60 min</text>

  <!-- Footer -->
  <text x="290" y="237" font-size="10" fill="#adb5bd" text-anchor="middle" font-style="italic">Mansour Pour et al., Geoenergy Science and Technology, 2023</text>
</svg>
